<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Aula - Universidad de Caldas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS y JS (cargados una sola vez) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Tus estilos -->
  <link rel="stylesheet" href="/css/stylesMapa.css">
</head>
<body>
  <div class="main-container">
    <!-- Mapa -->
    <div style="flex: 1; display: flex; flex-direction: column;">
      <div id="map" style="flex: 1;"></div>
      <!-- Info concisa debajo del mapa -->
      <div id="info-seleccionada"></div>
    </div>

    <!-- Formulario -->
    <div class="form-container">
      <h3>Buscar Aula</h3>
      <label>Nombre del edificio:</label>
      <input type="text" id="edificio">
      <label>Aula:</label>
      <input type="text" id="aula">
      <label>Piso del aula:</label>
      <input type="number" id="piso">
      <label>Nombre del docente:</label>
      <input type="text" id="docente">
      <label>Nombre de la asignatura:</label>
      <input type="text" id="materia">
      <button onclick="buscar()">Buscar</button>
      <div id="resultado"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="/js/mapa.js"></script>
  <script src="/js/busqueda.js"></script>
</body>
</html>
