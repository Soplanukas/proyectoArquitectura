<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Aula - Universidad de Caldas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="/css/stylesMapa.css">
</head>
<body>
  <div class="main-container d-flex flex-column flex-lg-row">
    <!-- Mapa + Info -->
    <div class="map-section flex-grow-1 p-3">
      <div id="map" class="mb-3"></div>
      <div id="info-seleccionada" class="rounded-bottom"></div>
    </div>

    <!-- Formulario -->
    <div class="form-container bg-dark text-white">
      <h3 class="mb-3 text-center">Buscar Aula</h3>

      <div class="mb-3">
        <label for="edificio" class="form-label">Nombre del edificio:</label>
        <input type="text" id="edificio" class="form-control">
      </div>

      <div class="mb-3">
        <label for="aula" class="form-label">Aula:</label>
        <input type="text" id="aula" class="form-control">
      </div>

      <div class="mb-3">
        <label for="piso" class="form-label">Piso del aula:</label>
        <input type="number" id="piso" class="form-control">
      </div>

      <div class="mb-3">
        <label for="docente" class="form-label">Nombre del docente:</label>
        <input type="text" id="docente" class="form-control">
      </div>

      <div class="mb-3">
        <label for="materia" class="form-label">Nombre de la asignatura:</label>
        <input type="text" id="materia" class="form-control">
      </div>

      <button onclick="buscar()" class="btn btn-primary w-100">Buscar</button>

      <div id="resultado" class="mt-4"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Scripts personalizados -->
  <script type="module" src="/js/mapa.js"></script>
  <script src="/js/busqueda.js"></script>
</body>
</html>
