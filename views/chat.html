<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Aulas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }

    .mensaje {
      margin: 0.5rem 0;
      padding: 0.75rem;
      border-radius: 10px;
      max-width: 75%;
    }

    .usuario {
      background-color: #d1e7dd;
      align-self: flex-end;
      text-align: right;
    }

    .bot {
      background-color: #f8d7da;
      align-self: flex-start;
    }

    #formulario {
      display: flex;
      padding: 1rem;
      background-color: #fff;
      border-top: 1px solid #ccc;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 0.75rem 1rem;
      margin-left: 0.5rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <div id="chat"></div>

  <form id="formulario">
    <input type="text" id="mensaje" placeholder="Escribe tu pregunta..." required />
    <button type="submit">Enviar</button>
  </form>

  <script>
    const chat = document.getElementById('chat');
    const formulario = document.getElementById('formulario');
    const input = document.getElementById('mensaje');

    formulario.addEventListener('submit', async (e) => {
      e.preventDefault();
      const mensaje = input.value.trim();
      if (!mensaje) return;

      // Mostrar mensaje del usuario
      agregarMensaje(mensaje, 'usuario');

      input.value = '';

      try {
        const respuesta = await fetch('/ia/preguntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje })
        });

        const data = await respuesta.json();
        agregarMensaje(data.respuesta || "Error en la respuesta", 'bot');
      } catch (err) {
        console.error(err);
        agregarMensaje("Ocurrió un error al conectar con el asistente.", 'bot');
      }
    });

    function agregarMensaje(texto, tipo) {
      const div = document.createElement('div');
      div.className = `mensaje ${tipo}`;

      if (tipo === 'bot') {
        div.innerHTML = marked.parse(texto); // 🔥 Renderiza Markdown
      } else {
        div.textContent = texto;
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>

</html>
