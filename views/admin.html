<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./bootstrap/css/bootstrap.css"> 

  <title>Panel Administrativo</title>

  <!-- Bootstrap local -->
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.css" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 20px;
      background-color: #1e1e1e;
      border-bottom: 1px solid #333;
    }

    .avatar {
      width: 100px;
      height: 100px;
      background-color: #444;
      border-radius: 50%;
      margin-right: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
    }

    .user-info h2 {
      margin: 0;
      font-size: 2rem;
    }

    .user-info p {
      margin: 4px 0 0;
      font-size: 1rem;
      color: #ccc;
    }

    .container {
      padding: 20px;
    }

    h2, h3 {
      color: #fff;
    }

    .form-container {
      background-color: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      background-color: #2b2b2b;
      color: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #444;
      text-align: left;
    }

    th {
      background-color: #333;
    }

    input, select {
      background-color: #2b2b2b;
      color: white;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px;
      width: 100%;
      margin-bottom: 10px;
    }

    button, .btn {
      background-color: #00bcd4;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      margin: 6px 6px 6px 0;
    }

    button:hover, .btn:hover {
      background-color: #00acc1;
    }
  </style>
</head>
<body>

  <!-- Header con perfil -->
  <div class="header">
    <div class="avatar">
      <span>👤</span>
    </div>
    <div class="user-info">
      <h2 id="adminName">Nombre Admin</h2>
      <p id="adminEmail">correo@example.com</p>
    </div>
  </div>

  <div class="container">

    <!-- Gestión de Usuarios -->
    <div class="crud-section" id="students-section">
      <h2>Gestión de Usuarios</h2>
      <button onclick="showStudentForm()">Agregar Usuario</button>
      <div class="form-container" id="student-form" style="display: none;">
        <h3>Nuevo Usuario</h3>
        <form id="addStudentForm">
          <input type="text" id="studentName" placeholder="Nombre del Usuario" required />
          <input type="email" id="studentEmail" placeholder="Correo Electrónico" required />
          <button type="submit">Guardar</button>
          <button type="button" onclick="hideStudentForm()">Cancelar</button>
        </form>
      </div>

      <table id="studentsTable">



        <thead>
          <tr>
            <th>UID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Se llena dinámicamente -->
        </tbody>
      </table>
    </div>

    <!-- Gestión de Aulas -->
    <div class="crud-section" id="classrooms-section">
      <h2>Gestión de Aulas</h2>
      <button onclick="showClassroomForm()">Agregar Aula</button>
      <div class="form-container" id="classroom-form" style="display: none;">
        <h3>Nueva Aula</h3>
        <form id="addClassroomForm">
          <label for="building">Edificio:</label>
          <select id="building" required>
            <option value="">Seleccionar Edificio</option>
            <option value="Administrativo">Edificio Administrativo</option>
            <option value="Orlando sierra">Edificio Orlando Sierra</option>
            <option value="Parque">Edificio del Parque</option>
            <option value="Micaela">Edificio Bicentenario (Mikaela)</option>
            <option value="Agropecuaria">Sede Sancancio</option>
            <option value="Laboratorios Marco Tulio Jaramillo Salazar">Edificio de Laboratorios</option>
          </select>

          <label for="classroomOriginal">Aula Original:</label>
          <input type="text" id="classroomOriginal" required />

          <label for="classroomRemitente">Aula Remitente:</label>
          <input type="text" id="classroomRemitente" required />

          <label for="floor">Piso:</label>
          <input type="number" id="floor" required />

          <label for="teacher">Nombre del Docente:</label>
          <input type="text" id="teacher" required />

          <label for="subject">Nombre de la Asignatura:</label>
          <input type="text" id="subject" required />

          <button type="submit">Guardar</button>
          <button type="button" onclick="hideClassroomForm()">Cancelar</button>
        </form>
      </div>

      <table id="classroomsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Edificio</th>
            <th>Aula Original</th>
            <th>Aula Remitente</th>
            <th>Piso</th>
            <th>Docente</th>
            <th>Asignatura</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Se llena dinámicamente -->
        </tbody>
      </table>
    </div>

  </div>

  <!-- Scripts -->
  <script src="/public/bootstrap/js/bootstrap.bundle.js"></script>
  <script type="module" src="./js/adminAulas.js"></script>
  <script type="module" src="./js/adminUsers.js"></script>
  <script type="module" src="./js/adminApp.js"></script>

  <script src="./bootstrap/js/bootstrap.js"></script> 

  <!-- Cargar nombre y correo con Firebase -->
  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { app } from '/firebaseConfig.js'; // Asegúrate que el path es correcto

    const auth = getAuth(app);
    const nameEl = document.getElementById('adminName');
    const emailEl = document.getElementById('adminEmail');

    onAuthStateChanged(auth, user => {
      if (user) {
        nameEl.textContent = user.displayName || 'Administrador';
        emailEl.textContent = user.email || '';
      } else {
        nameEl.textContent = 'No autenticado';
        emailEl.textContent = '';
      }
    });
  </script>


</body>
</html>
