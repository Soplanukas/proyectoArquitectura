<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Híbrido</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />

  <!-- Tu CSS personalizado -->
  <link rel="stylesheet" href="/css/stylelogin.css" />
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card login-container">
      <div class="card-body p-4">
        <!-- pestañas -->
        <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active"
              id="login-tab"
              data-bs-toggle="tab"
              data-bs-target="#login"
              type="button"
              role="tab"
              aria-controls="login"
              aria-selected="true"
            >
              Inicia sesión
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="register-tab"
              data-bs-toggle="tab"
              data-bs-target="#register"
              type="button"
              role="tab"
              aria-controls="register"
              aria-selected="false"
            >
              Regístrate
            </button>
          </li>
        </ul>

        <!-- contenido de pestañas -->
        <div class="tab-content" id="authTabContent">
          <!-- panel login -->
          <div
            class="tab-pane fade show active"
            id="login"
            role="tabpanel"
            aria-labelledby="login-tab"
          >
            <button id="login-google" class="btn btn-primary w-100 mb-2">
              Iniciar sesión con Google
            </button>
            <div class="divider text-center mb-3">o</div>
            <form id="email-login-form">
              <input
                type="email"
                id="email"
                class="form-control mb-2"
                placeholder="usuario@ucaldas.edu.co"
                required
              />
              <input
                type="password"
                id="password"
                class="form-control mb-3"
                placeholder="Contraseña"
                required
              />
              <button type="submit" class="btn btn-info w-100">
                Enviar
              </button>
            </form>
          </div>

          <!-- panel registro -->
          <div
            class="tab-pane fade"
            id="register"
            role="tabpanel"
            aria-labelledby="register-tab"
          >
            <button id="register-google" class="btn btn-primary w-100 mb-2">
              Regístrate con Google
            </button>
            <div class="divider text-center mb-3">o</div>
            <form id="email-register-form">
              <input
                type="email"
                id="reg-email"
                class="form-control mb-2"
                placeholder="usuario@ucaldas.edu.co"
                required
              />
              <input
                type="password"
                id="reg-password"
                class="form-control mb-3"
                placeholder="Contraseña"
                required
              />
              <button type="submit" class="btn btn-info w-100">
                Enviar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS (Popper incluido) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>

  <!-- Firebase + Lógica de autenticación -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCGwFsmz6SKcFlJTyULAIk2rR6CHJ6liM4",
      authDomain: "arquitectura-3b64b.firebaseapp.com",
      projectId: "arquitectura-3b64b",
      storageBucket: "arquitectura-3b64b.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef123456"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Función para enviar el token al backend
    async function sendTokenToBackend(token) {
      try {
        const response = await fetch("/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ token })
        });
        const data = await response.json();
        if (response.ok) {
          window.location.href = data.user.role === "admin" ? "/admin" : "/general";
        } else {
          alert(`Error: ${data.error}`);
        }
      } catch (error) {
        console.error("Error en autenticación:", error);
        alert("Error en el proceso de autenticación");
      }
    }

    // Inicia sesión con Google
    document.getElementById("login-google").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const token = await result.user.getIdToken();
        await sendTokenToBackend(token);
      } catch (error) {
        console.error("Error con Google:", error);
        alert("Error al iniciar sesión con Google");
      }
    });

    // Inicia sesión con Email/Password
    document.getElementById("email-login-form").addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if (!email.endsWith("@ucaldas.edu.co")) {
        alert("El correo debe pertenecer al dominio ucaldas.edu.co");
        return;
      }
      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        const token = await result.user.getIdToken();
        await sendTokenToBackend(token);
      } catch (error) {
        console.error("Error con Email/Password:", error);
        alert("Error al iniciar sesión con Email");
      }
    });

    // Regístrate con Google
    document.getElementById("register-google").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const token = await result.user.getIdToken();
        await sendTokenToBackend(token);
      } catch (error) {
        console.error("Error con Google (registro):", error);
        alert("Error al registrarse con Google");
      }
    });

    // Regístrate con Email/Password
    document.getElementById("email-register-form").addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;
      if (!email.endsWith("@ucaldas.edu.co")) {
        alert("El correo debe pertenecer al dominio ucaldas.edu.co");
        return;
      }
      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        const token = await result.user.getIdToken();
        await sendTokenToBackend(token);
      } catch (error) {
        console.error("Error en el registro:", error);
        alert("Error al registrarse con Email");
      }
    });
  </script>
</body>
</html>
